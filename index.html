<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>overlight</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: transparent;
      }
      body.debug {
        background: repeating-conic-gradient(#1b1e24 0% 25%, #262b33 0% 50%) 0 0 / 32px 32px;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      .boot-error {
        position: fixed;
        inset: auto 16px 16px 16px;
        padding: 12px 16px;
        font: 13px/1.5 ui-monospace, monospace;
        color: #ffb4b4;
        background: #2a1215e6;
        border: 1px solid #5c2129;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
